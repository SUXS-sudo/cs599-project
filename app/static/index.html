<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartRecipe</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f4f7f5;
      --surface: #ffffff;
      --surface-2: #eef4f0;
      --ink: #18231d;
      --muted: #617067;
      --line: #d8e2dc;
      --accent: #16745a;
      --accent-2: #d8662f;
      --accent-soft: #e2f3ec;
      --danger: #a33a2e;
      --shadow: 0 14px 35px rgba(35, 54, 45, 0.08);
      --radius: 8px;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    button, input, textarea, select {
      font: inherit;
    }

    button {
      border: 0;
      cursor: pointer;
    }

    button:disabled {
      cursor: wait;
      opacity: 0.65;
    }

    .shell {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 280px minmax(0, 1fr);
    }

    .sidebar {
      background: #fbfdfb;
      border-right: 1px solid var(--line);
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-width: 0;
      height: 100vh;
    }

    .brand {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .brand-main {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .mark {
      width: 38px;
      height: 38px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      background: var(--accent);
      color: #fff;
      font-weight: 800;
      letter-spacing: 0;
      flex: 0 0 auto;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      line-height: 1.1;
      letter-spacing: 0;
    }

    .subtitle {
      margin: 3px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
    }

    .panel-body {
      padding: 14px;
    }

    .section-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin-bottom: 10px;
      font-size: 13px;
      font-weight: 700;
      color: #314139;
    }

    .new-chat {
      width: 100%;
      min-height: 42px;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
    }

    .new-chat:hover { background: #12634d; }

    .history-section {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    .conversation-list {
      min-height: 0;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
      overflow-y: auto;
    }

    .conversation-entry {
      position: relative;
      overflow: visible;
    }

    .conversation-item {
      width: 100%;
      padding: 10px 42px 10px 10px;
      border-radius: 8px;
      border: 1px solid transparent;
      background: transparent;
      color: var(--ink);
      text-align: left;
      display: grid;
      gap: 4px;
    }

    .conversation-item:hover { background: var(--surface-2); }

    .conversation-item.active {
      border-color: #b8d9cc;
      background: var(--accent-soft);
    }

    .conversation-title {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-weight: 700;
      font-size: 13px;
    }

    .conversation-time, .session-label {
      color: var(--muted);
      font-size: 11px;
    }

    .conversation-more {
      position: absolute;
      top: 7px;
      right: 6px;
      width: 30px;
      height: 30px;
      border-radius: 7px;
      color: var(--muted);
      background: transparent;
      font-size: 20px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .conversation-more:hover,
    .conversation-more[aria-expanded="true"] {
      color: var(--ink);
      background: #dfe9e3;
    }

    .conversation-menu {
      position: fixed;
      z-index: 1000;
      min-width: 92px;
      padding: 5px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      box-shadow: var(--shadow);
    }

    .conversation-menu[hidden] { display: none; }

    .conversation-delete {
      width: 100%;
      padding: 8px 10px;
      border-radius: 6px;
      color: var(--danger);
      background: transparent;
      text-align: left;
      font-size: 13px;
      font-weight: 700;
    }

    .conversation-delete:hover { background: #faece9; }

    .sidebar-footer {
      display: grid;
      gap: 8px;
    }

    .sidebar-footer .link-btn { justify-content: center; }

    .field {
      display: grid;
      gap: 6px;
      margin-top: 10px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    input, textarea, select {
      width: 100%;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 7px;
      padding: 9px 10px;
      outline: none;
    }

    input:focus, textarea:focus, select:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(22, 116, 90, 0.13);
    }

    textarea {
      min-height: 104px;
      resize: vertical;
      line-height: 1.55;
    }

    .main {
      min-width: 0;
      display: grid;
      grid-template-rows: auto minmax(0, 1fr) auto;
      height: 100vh;
    }

    .topbar {
      background: rgba(255,255,255,0.88);
      border-bottom: 1px solid var(--line);
      padding: 14px 20px;
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
    }

    .topbar h2 {
      margin: 0;
      font-size: 18px;
    }

    .top-actions {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .icon-btn, .link-btn {
      min-height: 34px;
      border-radius: 7px;
      padding: 7px 10px;
      color: #244037;
      background: #fff;
      border: 1px solid var(--line);
      text-decoration: none;
      font-size: 13px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .icon-btn:hover, .link-btn:hover {
      border-color: #a9cfc0;
      background: #f7fbf9;
    }

    .conversation {
      overflow: auto;
      padding: 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .empty-state {
      margin: auto;
      max-width: 560px;
      text-align: center;
      color: var(--muted);
    }

    .empty-state h3 {
      color: var(--ink);
      margin: 0 0 8px;
      font-size: 22px;
    }

    .message {
      max-width: 860px;
      display: grid;
      gap: 8px;
      animation: rise 0.18s ease-out;
    }

    .message.user {
      align-self: flex-end;
      justify-items: end;
    }

    .message.assistant {
      align-self: flex-start;
    }

    .bubble {
      border-radius: 8px;
      padding: 12px 13px;
      line-height: 1.65;
      white-space: pre-wrap;
      word-break: break-word;
      border: 1px solid var(--line);
      background: #fff;
    }

    .user .bubble {
      color: #fff;
      border-color: var(--accent);
      background: var(--accent);
    }

    .assistant .bubble {
      box-shadow: var(--shadow);
    }

    .meta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .tag {
      padding: 4px 7px;
      border-radius: 999px;
      background: #eef3f0;
      color: #4b5f55;
      font-size: 12px;
      border: 1px solid var(--line);
    }

    .recipe-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 10px;
      width: min(860px, 100%);
    }

    .recipe-card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 11px;
      box-shadow: var(--shadow);
    }

    .recipe-card h4 {
      margin: 0 0 7px;
      font-size: 15px;
    }

    .recipe-card p {
      margin: 6px 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.45;
    }

    details {
      width: min(860px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 10px 12px;
    }

    summary {
      cursor: pointer;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }

    pre {
      margin: 10px 0 0;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 12px;
      line-height: 1.5;
      max-height: 280px;
      overflow: auto;
      background: #f7f9f8;
      border-radius: 7px;
      padding: 10px;
    }

    .composer {
      border-top: 1px solid var(--line);
      background: #fff;
      padding: 14px 20px;
    }

    .composer-grid {
      display: grid;
      grid-template-columns: 44px minmax(0, 1fr) auto;
      gap: 10px;
      align-items: end;
    }

    .attach-image {
      width: 44px;
      height: 44px;
      margin-bottom: 7px;
      border-radius: 50%;
      border: 1px solid var(--line);
      background: var(--surface-2);
      color: var(--accent);
      font-size: 26px;
      line-height: 1;
      display: grid;
      place-items: center;
    }

    .attach-image:hover {
      border-color: #a9cfc0;
      background: var(--accent-soft);
    }

    .file-input {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    .composer textarea {
      min-height: 58px;
      max-height: 180px;
    }

    .send {
      min-width: 98px;
      min-height: 58px;
      border-radius: 8px;
      color: #fff;
      background: var(--accent);
      font-weight: 800;
    }

    .send:hover {
      background: #12634d;
    }

    .preview {
      display: none;
      align-items: center;
      gap: 10px;
      padding: 8px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #f8fbf9;
      margin-bottom: 10px;
    }

    .preview.active {
      display: flex;
    }

    .preview img {
      width: 54px;
      height: 54px;
      object-fit: cover;
      border-radius: 7px;
      border: 1px solid var(--line);
    }

    .preview span {
      min-width: 0;
      flex: 1;
      font-size: 12px;
      color: var(--muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .remove-image {
      flex: 0 0 auto;
      padding: 6px 9px;
      border-radius: 7px;
      color: var(--danger);
      background: #fff;
      border: 1px solid var(--line);
      font-size: 12px;
    }

    .error {
      color: var(--danger);
    }

    @keyframes rise {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 940px) {
      .shell {
        grid-template-columns: 1fr;
      }
      .main {
        height: calc(100vh - 220px);
      }
      .sidebar {
        height: 220px;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }
      .brand { align-items: flex-start; }
      .history-section { min-height: 76px; }
      .conversation-list {
        display: grid;
        grid-auto-flow: column;
        grid-auto-columns: minmax(180px, 240px);
        overflow-x: auto;
        overflow-y: hidden;
      }
      .sidebar-footer { display: none; }
      .conversation {
        min-height: 520px;
      }
    }

    @media (max-width: 620px) {
      .topbar, .composer, .conversation, .sidebar {
        padding-left: 12px;
        padding-right: 12px;
      }
      .composer-grid {
        grid-template-columns: 40px minmax(0, 1fr) auto;
      }
      .send {
        width: auto;
        min-height: 44px;
      }
      .attach-image {
        width: 40px;
        height: 40px;
      }
      .topbar {
        align-items: flex-start;
        flex-direction: column;
      }
      .top-actions {
        justify-content: flex-start;
      }
    }
  </style>
</head>
<body>
  <div class="shell" id="appShell">
    <aside class="sidebar" aria-label="对话记录">
      <div class="brand">
        <div class="brand-main">
          <div class="mark" aria-hidden="true">SR</div>
          <div>
            <h1>SmartRecipe</h1>
            <p class="subtitle">每个对话独立记忆</p>
          </div>
        </div>
      </div>
      <button class="new-chat" id="newChat" type="button">＋ 新建对话</button>
      <section class="history-section">
        <div class="section-title"><span>对话记录</span><span id="conversationCount">0</span></div>
        <div class="conversation-list" id="conversationList"></div>
      </section>
      <div class="sidebar-footer">
        <a class="link-btn" href="/ui/database.html" target="_blank" rel="noreferrer">数据库预览</a>
        <span class="session-label">记录保存在当前浏览器</span>
      </div>
    </aside>
    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="activeConversationTitle">新对话</h2>
          <p class="subtitle" id="activeSessionLabel">Session：-</p>
        </div>
        <div class="top-actions">
          <button class="icon-btn" id="clearChat" type="button">删除当前对话</button>
        </div>
      </header>

      <section class="conversation" id="conversation" aria-live="polite">
        <div class="empty-state" id="emptyState">
          <h3>开始一次菜谱对话</h3>
          <p>可以询问菜谱做法、饮食目标、食材替换、数据库统计、图谱关系，也可以切换到图片模式上传菜品照片。</p>
        </div>
      </section>

      <form class="composer" id="composer">
        <input id="sessionId" type="hidden">
        <input class="file-input" id="imageFile" type="file" accept="image/*">
        <div class="preview" id="imagePreview">
          <img id="previewImage" alt="图片预览">
          <span id="previewName"></span>
          <button class="remove-image" id="removeImage" type="button">移除</button>
        </div>
        <div class="composer-grid">
          <button class="attach-image" id="attachImage" type="button" aria-label="上传图片" title="上传图片">＋</button>
          <textarea id="message" placeholder="输入问题，回车发送；也可以点击加号上传图片"></textarea>
          <button class="send" id="sendButton" type="submit">发送</button>
        </div>
      </form>
    </main>
  </div>

  <script>
    const conversation = document.querySelector("#conversation");
    const emptyState = document.querySelector("#emptyState");
    const messageInput = document.querySelector("#message");
    const sessionInput = document.querySelector("#sessionId");
    const sendButton = document.querySelector("#sendButton");
    const imageFile = document.querySelector("#imageFile");
    const attachImageButton = document.querySelector("#attachImage");
    const removeImageButton = document.querySelector("#removeImage");
    const imagePreview = document.querySelector("#imagePreview");
    const previewImage = document.querySelector("#previewImage");
    const previewName = document.querySelector("#previewName");
    const conversationList = document.querySelector("#conversationList");
    const conversationCount = document.querySelector("#conversationCount");
    const activeConversationTitle = document.querySelector("#activeConversationTitle");
    const activeSessionLabel = document.querySelector("#activeSessionLabel");
    const newChatButton = document.querySelector("#newChat");
    const deleteChatButton = document.querySelector("#clearChat");

    const storageKey = "smartrecipe.conversations.v1";
    const activeStorageKey = "smartrecipe.activeConversation.v1";
    const defaultTopK = 1;
    let pending = false;
    let conversations = loadConversations();
    let activeConversationId = loadActiveConversationId();

    if (!conversations.some((item) => item.id === activeConversationId)) {
      activeConversationId = conversations[0]?.id || "";
    }
    if (!activeConversationId) createConversation(false);
    selectConversation(activeConversationId);

    attachImageButton.addEventListener("click", () => imageFile.click());
    removeImageButton.addEventListener("click", resetImageInput);

    newChatButton.addEventListener("click", () => {
      if (!pending) createConversation(true);
    });

    document.addEventListener("click", closeConversationMenus);
    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape") closeConversationMenus();
    });

    deleteChatButton.addEventListener("click", () => deleteConversation(activeConversationId));

    function deleteConversation(id) {
      if (pending) return;
      const target = conversations.find((item) => item.id === id);
      if (!target || !window.confirm(`删除对话“${target.title}”？后端中已经形成的会话记忆不会转移到其他对话。`)) return;
      conversations = conversations.filter((item) => item.id !== id);
      if (!conversations.length) {
        activeConversationId = "";
        createConversation(false);
      } else if (activeConversationId === id) {
        activeConversationId = sortedConversations()[0].id;
      } else {
        saveConversations();
        renderConversationList();
        return;
      }
      saveConversations();
      selectConversation(activeConversationId);
    }

    imageFile.addEventListener("change", () => {
      const file = imageFile.files[0];
      if (!file) {
        resetImageInput();
        return;
      }
      previewImage.src = URL.createObjectURL(file);
      previewName.textContent = `${file.name} · ${Math.round(file.size / 1024)} KB`;
      imagePreview.classList.add("active");
      messageInput.placeholder = "可补充图片问题；留空发送则默认识别菜品";
      messageInput.focus();
    });

    document.querySelector("#composer").addEventListener("submit", async (event) => {
      event.preventDefault();
      if (pending) return;
      let text = messageInput.value.trim();
      const selectedImage = imageFile.files[0] || null;
      if (!text && selectedImage) {
        text = "这是什么菜？";
      }
      if (!text) return;

      appendUser(text, selectedImage, true);
      messageInput.value = "";
      resetImageInput();
      setPending(true);
      const typing = appendTyping();
      try {
        const data = selectedImage ? await submitImage(text, selectedImage) : await submitText(text);
        typing.remove();
        appendAssistant(data, true);
      } catch (error) {
        typing.remove();
        appendAssistant({ answer: `请求失败：${error.message}`, error: true }, true);
      } finally {
        setPending(false);
      }
    });

    async function submitText(text) {
      return fetchJson("/chat", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          message: text,
          session_id: sessionInput.value.trim(),
          top_k: defaultTopK
        })
      });
    }

    async function submitImage(text, file) {
      const form = new FormData();
      form.append("image", file);
      form.append("message", text);
      form.append("session_id", sessionInput.value.trim());
      form.append("top_k", String(defaultTopK));
      return fetchJson("/chat/image", { method: "POST", body: form });
    }

    async function fetchJson(url, options) {
      const response = await fetch(url, options);
      const text = await response.text();
      let data;
      try {
        data = text ? JSON.parse(text) : {};
      } catch {
        throw new Error(text || response.statusText);
      }
      if (!response.ok) {
        throw new Error(data.detail || data.message || response.statusText);
      }
      return data;
    }

    function appendUser(text, file, persist = false) {
      emptyState.hidden = true;
      const item = document.createElement("article");
      item.className = "message user";
      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = text;
      item.appendChild(bubble);
      const fileName = typeof file === "string" ? file : file?.name;
      if (fileName) {
        const meta = document.createElement("div");
        meta.className = "meta-row";
        meta.innerHTML = `<span class="tag">图片：${escapeHtml(fileName)}</span>`;
        item.appendChild(meta);
      }
      conversation.appendChild(item);
      if (persist) {
        const current = activeConversation();
        current.messages.push({ role: "user", text, fileName: fileName || "" });
        if (current.messages.filter((message) => message.role === "user").length === 1) {
          current.title = makeConversationTitle(text);
        }
        touchAndSave(current);
      }
      scrollToBottom();
    }

    function appendTyping() {
      emptyState.hidden = true;
      const item = document.createElement("article");
      item.className = "message assistant";
      item.innerHTML = `<div class="bubble">正在思考并调用合适的 Agent...</div>`;
      conversation.appendChild(item);
      scrollToBottom();
      return item;
    }

    function appendAssistant(data, persist = false) {
      emptyState.hidden = true;
      const item = document.createElement("article");
      item.className = "message assistant";
      const bubble = document.createElement("div");
      bubble.className = `bubble${data.error ? " error" : ""}`;
      bubble.textContent = data.answer || "没有返回内容。";
      item.appendChild(bubble);

      if (!data.error) {
        const row = document.createElement("div");
        row.className = "meta-row";
        row.innerHTML = `
          <span class="tag">意图：${escapeHtml(data.intent || "-")}</span>
          <span class="tag">Agent：${escapeHtml(data.agent || "-")}</span>
          <span class="tag">Session：${escapeHtml(data.session_id || "-")}</span>
        `;
        item.appendChild(row);

        if (Array.isArray(data.recipes) && data.recipes.length) {
          item.appendChild(renderRecipes(data.recipes));
        }

        const detail = document.createElement("details");
        detail.innerHTML = `<summary>查看原始 meta</summary><pre>${escapeHtml(JSON.stringify(data.meta || {}, null, 2))}</pre>`;
        item.appendChild(detail);
      }

      conversation.appendChild(item);
      if (persist) {
        const current = activeConversation();
        current.messages.push({ role: "assistant", data: compactAssistantData(data) });
        touchAndSave(current);
      }
      scrollToBottom();
    }

    function createConversation(select = true) {
      const now = new Date().toISOString();
      const id = createId();
      const item = {
        id,
        sessionId: `chat-${id}`,
        title: "新对话",
        createdAt: now,
        updatedAt: now,
        messages: []
      };
      conversations.push(item);
      activeConversationId = id;
      saveConversations();
      if (select) selectConversation(id);
      return item;
    }

    function selectConversation(id) {
      const target = conversations.find((item) => item.id === id);
      if (!target || pending) return;
      activeConversationId = target.id;
      saveConversations();
      sessionInput.value = target.sessionId;
      activeConversationTitle.textContent = target.title;
      activeSessionLabel.textContent = `Session：${target.sessionId}`;
      resetImageInput();
      renderConversationList();
      renderActiveConversation();
      messageInput.focus();
    }

    function renderActiveConversation() {
      const current = activeConversation();
      conversation.innerHTML = "";
      conversation.appendChild(emptyState);
      emptyState.hidden = Boolean(current.messages.length);
      for (const message of current.messages) {
        if (message.role === "user") {
          appendUser(message.text || "", message.fileName || "", false);
        } else if (message.role === "assistant") {
          appendAssistant(message.data || { answer: "没有返回内容。" }, false);
        }
      }
      scrollToBottom();
    }

    function renderConversationList() {
      conversationList.innerHTML = "";
      const items = sortedConversations();
      conversationCount.textContent = String(items.length);
      for (const item of items) {
        const entry = document.createElement("div");
        entry.className = "conversation-entry";
        const button = document.createElement("button");
        button.type = "button";
        button.className = `conversation-item${item.id === activeConversationId ? " active" : ""}`;
        button.dataset.conversationId = item.id;
        const title = document.createElement("span");
        title.className = "conversation-title";
        title.textContent = item.title;
        const time = document.createElement("span");
        time.className = "conversation-time";
        time.textContent = formatConversationTime(item.updatedAt);
        button.append(title, time);
        button.addEventListener("click", () => selectConversation(item.id));

        const moreButton = document.createElement("button");
        moreButton.type = "button";
        moreButton.className = "conversation-more";
        moreButton.textContent = "⋯";
        moreButton.setAttribute("aria-label", `打开“${item.title}”操作菜单`);
        moreButton.setAttribute("aria-expanded", "false");

        const menu = document.createElement("div");
        menu.className = "conversation-menu";
        menu.hidden = true;
        const removeButton = document.createElement("button");
        removeButton.type = "button";
        removeButton.className = "conversation-delete";
        removeButton.textContent = "删除";

        moreButton.addEventListener("click", (event) => {
          event.stopPropagation();
          const willOpen = menu.hidden;
          closeConversationMenus();
          if (willOpen) {
            const rect = moreButton.getBoundingClientRect();
            menu.style.top = (rect.bottom + 4) + "px";
            menu.style.right = "auto";
            menu.style.left = (rect.right - 92) + "px";
          }
          menu.hidden = !willOpen;
          moreButton.setAttribute("aria-expanded", String(willOpen));
        });
        removeButton.addEventListener("click", (event) => {
          event.stopPropagation();
          deleteConversation(item.id);
        });
        menu.appendChild(removeButton);
        entry.append(button, moreButton, menu);
        conversationList.appendChild(entry);
      }
    }

    function closeConversationMenus() {
      for (const menu of conversationList.querySelectorAll(".conversation-menu")) menu.hidden = true;
      for (const button of conversationList.querySelectorAll(".conversation-more")) {
        button.setAttribute("aria-expanded", "false");
      }
    }

    function activeConversation() {
      return conversations.find((item) => item.id === activeConversationId);
    }

    function touchAndSave(item) {
      item.updatedAt = new Date().toISOString();
      activeConversationTitle.textContent = item.title;
      saveConversations();
      renderConversationList();
    }

    function sortedConversations() {
      return [...conversations].sort((left, right) => String(right.updatedAt).localeCompare(String(left.updatedAt)));
    }

    function loadConversations() {
      try {
        const parsed = JSON.parse(localStorage.getItem(storageKey) || "[]");
        if (!Array.isArray(parsed)) return [];
        return parsed.filter((item) => item && item.id && item.sessionId && Array.isArray(item.messages));
      } catch {
        return [];
      }
    }

    function saveConversations() {
      try {
        localStorage.setItem(storageKey, JSON.stringify(conversations));
        if (activeConversationId) localStorage.setItem(activeStorageKey, activeConversationId);
      } catch (error) {
        console.warn("无法保存本地对话记录", error);
      }
    }

    function loadActiveConversationId() {
      try {
        return localStorage.getItem(activeStorageKey) || "";
      } catch {
        return "";
      }
    }

    function compactAssistantData(data) {
      return {
        answer: data.answer || "没有返回内容。",
        error: Boolean(data.error),
        intent: data.intent || "",
        agent: data.agent || "",
        session_id: data.session_id || sessionInput.value,
        recipes: Array.isArray(data.recipes) ? data.recipes : [],
        meta: data.meta && typeof data.meta === "object" ? data.meta : {}
      };
    }

    function makeConversationTitle(text) {
      const normalized = text.replace(/\s+/g, " ").trim();
      return normalized.length > 18 ? `${normalized.slice(0, 18)}…` : normalized || "新对话";
    }

    function formatConversationTime(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      return new Intl.DateTimeFormat("zh-CN", { month: "numeric", day: "numeric", hour: "2-digit", minute: "2-digit" }).format(date);
    }

    function createId() {
      if (globalThis.crypto?.randomUUID) return globalThis.crypto.randomUUID();
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function resetImageInput() {
      imageFile.value = "";
      imagePreview.classList.remove("active");
      previewImage.removeAttribute("src");
      previewName.textContent = "";
      messageInput.placeholder = "输入问题，回车发送；也可以点击加号上传图片";
    }

    function renderRecipes(recipes) {
      const grid = document.createElement("div");
      grid.className = "recipe-grid";
      for (const recipe of recipes) {
        const card = document.createElement("div");
        card.className = "recipe-card";
        const ingredients = Array.isArray(recipe.ingredients) ? recipe.ingredients.slice(0, 5).join("、") : "";
        const tags = Array.isArray(recipe.tags) ? recipe.tags.slice(0, 4).join("、") : "";
        card.innerHTML = `
          <h4>${escapeHtml(recipe.name || "未命名菜谱")}</h4>
          <p>匹配分：${escapeHtml(String(recipe.score ?? "-"))} · ${escapeHtml(recipe.category || "未分类")}</p>
          <p>${escapeHtml(recipe.cooking_time || "时间未知")} · ${escapeHtml(recipe.difficulty || "难度未知")} · ${escapeHtml(String(recipe.calories ?? 0))} kcal</p>
          <p>食材：${escapeHtml(ingredients || "暂无")}</p>
          <p>标签：${escapeHtml(tags || "暂无")}</p>
        `;
        grid.appendChild(card);
      }
      return grid;
    }

    function setPending(value) {
      pending = value;
      sendButton.disabled = value;
      newChatButton.disabled = value;
      deleteChatButton.disabled = value;
      attachImageButton.disabled = value;
      imageFile.disabled = value;
      sendButton.textContent = value ? "处理中" : "发送";
    }

    messageInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        document.querySelector("#composer").requestSubmit();
      }
    });

    function scrollToBottom() {
      conversation.scrollTop = conversation.scrollHeight;
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }
  </script>
</body>
</html>
