<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SmartRecipe Database Browser</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #16201d;
      --muted: #65736f;
      --line: #d8e2df;
      --panel: #ffffff;
      --band: #f4f7f5;
      --accent: #217a62;
      --accent-2: #315f9c;
      --danger: #a33b37;
      --soft-blue: #e8eef8;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Microsoft YaHei", Arial, sans-serif;
      color: var(--ink);
      background: var(--band);
    }
    header {
      min-height: 70px;
      padding: 14px 22px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }
    h1 { margin: 0; font-size: 22px; }
    main {
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
      min-height: calc(100vh - 70px);
    }
    aside {
      border-right: 1px solid var(--line);
      background: #fbfcfb;
      padding: 14px;
      overflow: auto;
    }
    section {
      padding: 16px;
      overflow: auto;
    }
    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }
    button, input {
      min-height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      font: inherit;
      padding: 8px 10px;
    }
    button {
      cursor: pointer;
      font-weight: 650;
    }
    button.primary {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }
    button.active {
      border-color: var(--accent-2);
      background: var(--soft-blue);
      color: var(--accent-2);
    }
    .tabs {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .group-title {
      margin: 16px 0 8px;
      color: var(--muted);
      font-size: 13px;
      font-weight: 700;
    }
    .item {
      width: 100%;
      margin: 4px 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      text-align: left;
    }
    .item span {
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .count {
      color: var(--muted);
      font-size: 12px;
      flex: 0 0 auto;
    }
    .status {
      color: var(--muted);
      font-size: 13px;
    }
    .error {
      color: var(--danger);
      background: #fff4f3;
      border: 1px solid #f0c8c5;
      border-radius: 6px;
      padding: 10px;
      margin: 8px 0;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border: 1px solid var(--line);
    }
    th, td {
      border-bottom: 1px solid var(--line);
      padding: 8px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 13px;
    }
    th {
      position: sticky;
      top: 0;
      background: #f8faf9;
      z-index: 1;
    }
    td {
      max-width: 360px;
      white-space: pre-wrap;
      word-break: break-word;
    }
    pre {
      margin: 0;
      padding: 12px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.5;
    }
    @media (max-width: 900px) {
      main { grid-template-columns: 1fr; }
      aside { border-right: 0; border-bottom: 1px solid var(--line); }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>SmartRecipe 数据库浏览器</h1>
      <div class="status" id="target">MySQL / Redis / Neo4j 只读预览</div>
    </div>
    <div class="toolbar">
      <label for="limit">行数</label>
      <input id="limit" type="number" min="1" max="200" value="50">
      <button class="primary" id="refresh" type="button">刷新</button>
      <a href="/ui/"><button type="button">聊天控制台</button></a>
    </div>
  </header>
  <main>
    <aside>
      <div class="tabs">
        <button id="tab-mysql" class="active" type="button">MySQL</button>
        <button id="tab-redis" type="button">Redis</button>
        <button id="tab-neo4j" type="button">Neo4j</button>
      </div>
      <div id="list"></div>
    </aside>
    <section>
      <div id="content"><pre>正在加载数据库概览...</pre></div>
    </section>
  </main>
  <script>
    let overview = null;
    let active = "mysql";
    const list = document.querySelector("#list");
    const content = document.querySelector("#content");
    const target = document.querySelector("#target");

    function limit() {
      return Math.min(Math.max(Number(document.querySelector("#limit").value || 50), 1), 200);
    }

    function setActive(name) {
      active = name;
      for (const item of ["mysql", "redis", "neo4j"]) {
        document.querySelector(`#tab-${item}`).classList.toggle("active", item === name);
      }
      renderList();
    }

    async function refresh() {
      content.innerHTML = "<pre>正在加载数据库概览...</pre>";
      const response = await fetch("/debug/database/overview");
      overview = await response.json();
      renderList();
    }

    function sectionData(name) {
      return overview && overview[name] && overview[name].ok ? overview[name].data : null;
    }

    function renderList() {
      if (!overview) return;
      const data = sectionData(active);
      const section = overview[active];
      if (!section.ok) {
        target.textContent = `${active} 连接失败`;
        list.innerHTML = `<div class="error">${escapeHtml(section.error)}: ${escapeHtml(section.message)}</div>`;
        content.innerHTML = `<pre>${escapeHtml(JSON.stringify(section, null, 2))}</pre>`;
        return;
      }
      target.textContent = data.target || "connected";
      if (active === "mysql") renderMysqlList(data);
      if (active === "redis") renderRedisList(data);
      if (active === "neo4j") renderNeo4jList(data);
    }

    function renderMysqlList(data) {
      list.innerHTML = `<div class="group-title">表</div>` + data.tables.map(table =>
        `<button class="item" type="button" data-table="${escapeAttr(table.name)}"><span>${escapeHtml(table.name)}</span><strong class="count">${table.rows}</strong></button>`
      ).join("");
      for (const button of list.querySelectorAll("[data-table]")) {
        button.onclick = () => loadMysqlTable(button.dataset.table);
      }
      content.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    function renderRedisList(data) {
      list.innerHTML =
        `<div class="group-title">Keys (${data.dbsize})</div>` +
        data.keys.map(item =>
          `<button class="item" type="button" data-key="${escapeAttr(item.key)}"><span>${escapeHtml(item.key)}</span><strong class="count">${escapeHtml(item.type)}</strong></button>`
        ).join("");
      for (const button of list.querySelectorAll("[data-key]")) {
        button.onclick = () => loadRedisKey(button.dataset.key);
      }
      content.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    function renderNeo4jList(data) {
      const labels = data.labels.map(item =>
        `<button class="item" type="button" data-label="${escapeAttr(item.label)}"><span>${escapeHtml(item.label)}</span><strong class="count">${item.count}</strong></button>`
      ).join("");
      const rels = data.relationships.map(item =>
        `<button class="item" type="button"><span>${escapeHtml(item.type)}</span><strong class="count">${item.count}</strong></button>`
      ).join("");
      list.innerHTML = `<div class="group-title">节点标签</div>${labels}<div class="group-title">关系类型</div>${rels}`;
      for (const button of list.querySelectorAll("[data-label]")) {
        button.onclick = () => loadNeo4jLabel(button.dataset.label);
      }
      content.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
    }

    async function loadMysqlTable(table) {
      content.innerHTML = "<pre>正在读取 MySQL 表...</pre>";
      const response = await fetch(`/debug/database/mysql/${encodeURIComponent(table)}?limit=${limit()}`);
      renderResult(await response.json());
    }

    async function loadRedisKey(key) {
      content.innerHTML = "<pre>正在读取 Redis key...</pre>";
      const response = await fetch(`/debug/database/redis/key?key=${encodeURIComponent(key)}&limit=${limit()}`);
      renderResult(await response.json());
    }

    async function loadNeo4jLabel(label) {
      content.innerHTML = "<pre>正在读取 Neo4j 节点...</pre>";
      const response = await fetch(`/debug/database/neo4j/${encodeURIComponent(label)}?limit=${limit()}`);
      renderResult(await response.json());
    }

    function renderResult(result) {
      if (!result.ok) {
        content.innerHTML = `<div class="error">${escapeHtml(result.error)}: ${escapeHtml(result.message)}</div>`;
        return;
      }
      const data = result.data;
      if (data.rows && data.rows.length) {
        content.innerHTML = tableHtml(data.rows);
      } else {
        content.innerHTML = `<pre>${escapeHtml(JSON.stringify(data, null, 2))}</pre>`;
      }
    }

    function tableHtml(rows) {
      const columns = Array.from(new Set(rows.flatMap(row => Object.keys(row))));
      const head = columns.map(col => `<th>${escapeHtml(col)}</th>`).join("");
      const body = rows.map(row => "<tr>" + columns.map(col =>
        `<td>${escapeHtml(formatCell(row[col]))}</td>`
      ).join("") + "</tr>").join("");
      return `<table><thead><tr>${head}</tr></thead><tbody>${body}</tbody></table>`;
    }

    function formatCell(value) {
      if (value === null || value === undefined) return "";
      if (typeof value === "object") return JSON.stringify(value, null, 2);
      return String(value);
    }

    function escapeHtml(value) {
      return String(value).replace(/[&<>"']/g, char => ({
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"
      }[char]));
    }

    function escapeAttr(value) {
      return escapeHtml(value).replace(/`/g, "&#96;");
    }

    document.querySelector("#tab-mysql").onclick = () => setActive("mysql");
    document.querySelector("#tab-redis").onclick = () => setActive("redis");
    document.querySelector("#tab-neo4j").onclick = () => setActive("neo4j");
    document.querySelector("#refresh").onclick = refresh;
    refresh();
  </script>
</body>
</html>
